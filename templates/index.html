<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DDR Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-container">
        <h1>AI DDR Generator</h1>
        <p class="subtitle">Upload your inspection and thermal reports to generate a detailed diagnostic PDF instantly.</p>

        <form id="uploadForm">
            <div class="upload-area">
                <label>Inspection Report (PDF)</label>
                <div class="file-drop-zone" id="zone-inspection" onclick="document.getElementById('inspection_file').click()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    <p>Drag & Drop or Click to Browse</p>
                    <span class="selected-file" id="inspection-name"></span>
                </div>
                <input type="file" id="inspection_file" name="inspection_report" accept="application/pdf" required>
            </div>

            <div class="upload-area">
                <label>Thermal Images Report (PDF)</label>
                <div class="file-drop-zone" id="zone-thermal" onclick="document.getElementById('thermal_file').click()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                    <p>Drag & Drop or Click to Browse</p>
                    <span class="selected-file" id="thermal-name"></span>
                </div>
                <input type="file" id="thermal_file" name="thermal_report" accept="application/pdf" required>
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">
                <span id="btnText">Generate DDR Report</span>
                <div class="loader" id="loader"></div>
            </button>
            <div id="errorMsg" class="error-msg"></div>
        </form>

        <div id="previewContainer" style="display: none; text-align: center;">
            <iframe id="pdfIframe" style="width: 100%; height: 500px; border: none; border-radius: 12px; margin-bottom: 20px;"></iframe>
            <div style="display: flex; gap: 16px; justify-content: center;">
                <button id="downloadBtn" class="submit-btn" style="width: auto;">Download PDF</button>
                <button id="resetBtn" class="submit-btn" style="width: auto; background: #6B7280;">Upload Another</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
